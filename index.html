<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ondine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --blue: #1a56db;
  --blue-mid: #3b82f6;
  --blue-light: #dbeafe;
  --blue-faint: #eff6ff;
  --surface: #ffffff;
  --surface-secondary: #f7f8fb;
  --surface-plot: #f4f7fe;
  --body-bg: #e8edf4;
  --border: #d1d9e6;
  --border-strong: #b0bdd0;
  --text: #111827;
  --text-mid: #4b5563;
  --text-dim: #9ca3af;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-body: 'IBM Plex Sans', sans-serif;
  --panel-radius: 6px;
  --gap: 14px;
}

[data-theme="dark"] {
  --blue: #c8c8c8;
  --blue-mid: #a0a0a0;
  --blue-light: #222222;
  --blue-faint: #1a1a1a;
  --surface: #181818;
  --surface-secondary: #111111;
  --surface-plot: #141414;
  --body-bg: #0a0a0a;
  --border: #2a2a2a;
  --border-strong: #3a3a3a;
  --text: #e8e8e8;
  --text-mid: #999999;
  --text-dim: #555555;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--body-bg); }
body {
  font-family: var(--font-body);
  background: var(--body-bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 16px 56px;
}


/* ── Header ── */
header {
  width: 100%; max-width: 960px;
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 28px 0 16px;
  border-bottom: 1px solid var(--border-strong);
  margin-bottom: var(--gap);
}
.brand { display: flex; flex-direction: column; gap: 3px; }
.brand-name { font-family: var(--font-body); font-weight: 300; font-size: 24px; letter-spacing: -0.01em; color: var(--text); line-height: 1; }
.brand-name strong { font-weight: 500; }
.brand-sub { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; }
.header-status { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; }


/* ── Main layout ── */
main {
  width: 100%; max-width: 960px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto auto;
  gap: var(--gap);
}

/* Panels */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--panel-radius);
  padding: 18px 20px;
}
.panel-label {
  font-family: var(--font-mono); font-size: 9px; font-weight: 500;
  letter-spacing: 0.14em; color: var(--text-dim); text-transform: uppercase;
  margin-bottom: 14px;
}

/* ── Scale notes grid ── */
.notes-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; }
.note-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }

.wslider-wrap {
  position: relative;
  width: 100%; height: 140px;
  background: var(--surface-secondary); border: 1px solid var(--border);
  border-radius: 4px; overflow: hidden;
}
.wslider {
  -webkit-appearance: none; appearance: none;
  position: absolute;
  left: 50%; top: 50%;
  height: 4px;
  background: var(--border-strong); border-radius: 2px; outline: none; cursor: pointer;
  transform: rotate(-90deg);
  transform-origin: center center;
}
.wslider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 10px; border-radius: 3px;
  background: var(--blue); border: 2px solid var(--surface);
  box-shadow: 0 0 0 1.5px var(--blue-mid); cursor: pointer;
  transition: box-shadow 0.1s;
}
.wslider:hover::-webkit-slider-thumb { box-shadow: 0 0 0 4px var(--blue-light); }
.wslider::-moz-range-thumb {
  width: 22px; height: 10px; border-radius: 3px;
  background: var(--blue); border: 2px solid #fff; cursor: pointer;
}
.wval { font-family: var(--font-mono); font-size: 8px; color: var(--text-dim); text-align: center; line-height: 1; }

.nbtn {
  width: 100%; aspect-ratio: 1; min-height: 24px; border-radius: 4px; border: 1px solid var(--border);
  background: var(--surface-secondary); font-family: var(--font-mono); font-size: 9px;
  cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; transition: border-color 0.1s, background 0.1s; line-height: 1; padding: 0;
}
.nbtn .note-name { font-size: 10px; font-weight: 500; color: var(--text-mid); }
.nbtn:hover:not(.root) { border-color: var(--blue-mid); background: var(--blue-faint); }
.nbtn.on { background: var(--blue-light); border-color: var(--blue-mid); }
.nbtn.on .note-name { color: var(--blue); }
.nbtn.root { background: var(--blue-faint); border-color: var(--blue); cursor: default; }
.nbtn.root .note-name { color: var(--blue); }

.active-notes {
  background: var(--surface-secondary); border: 1px solid var(--border); border-radius: 4px;
  padding: 8px 12px; font-family: var(--font-mono); font-size: 11px;
  min-height: 34px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 11px;
}
.active-notes .note-tag { background: var(--blue-light); border: 1px solid var(--border-strong); border-radius: 3px; padding: 1px 6px; font-size: 10px; color: var(--blue); }
.active-notes .label { color: var(--text-dim); font-size: 9px; letter-spacing: 0.12em; }

/* ── Waveform scope ── */
.scope-panel { grid-column: 1 / -1; }
.scope-outer { background: var(--surface-plot); border: 1px solid var(--border); border-radius: 5px; padding: 10px 12px 8px; }
.scope-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
.scope-meta { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 0.06em; }
.scope-meta b { color: var(--text-mid); font-weight: 500; }
.scope-inner { position: relative; width: 100%; height: 160px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
.scope-inner canvas { display: block; }

/* ── Scale library ── */
.library-panel { display: flex; flex-direction: column; }
.library-panel .panel-label { flex-shrink: 0; }

.scale-search {
  width: 100%; padding: 6px 10px;
  font-family: var(--font-mono); font-size: 10px;
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--surface-secondary); color: var(--text);
  outline: none; margin-bottom: 9px; flex-shrink: 0;
  transition: border-color 0.1s;
}
.scale-search:focus { border-color: var(--blue-mid); background: var(--surface); }
.scale-search::placeholder { color: var(--text-dim); }

.library-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  padding-right: 2px; min-height: 0; max-height: 380px;
}
.library-scroll::-webkit-scrollbar { width: 4px; }
.library-scroll::-webkit-scrollbar-track { background: transparent; }
.library-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

/* ── Accordion folder tree ── */
.folder-tree { display: flex; flex-direction: column; gap: 3px; }
.folder { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; flex-shrink: 0; }
.folder-header {
  display: flex; align-items: center;
  padding: 7px 10px; cursor: pointer;
  background: var(--surface-secondary);
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em;
  color: var(--text-mid); text-transform: uppercase;
  user-select: none; transition: background 0.1s, color 0.1s; gap: 7px;
}
.folder-header:hover { background: var(--blue-faint); color: var(--blue); }
.folder-header.open { background: var(--blue-light); color: var(--blue); }
.folder-arrow { width: 10px; height: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: transform 0.18s ease; }
.folder-header.open .folder-arrow { transform: rotate(90deg); }
.folder-arrow svg { fill: currentColor; }
.folder-count { margin-left: auto; font-size: 8px; color: var(--text-dim); background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 1px 5px; line-height: 1.4; flex-shrink: 0; }
.folder-header.open .folder-count { background: var(--blue-faint); border-color: #bfdbfe; color: var(--blue-mid); }
.folder-body { max-height: 0; overflow: hidden; transition: max-height 0.22s ease; background: var(--surface); }
.folder-body.open { max-height: 2400px; transition: max-height 0.35s ease; }
.folder-body-inner { display: flex; flex-direction: column; gap: 1px; padding: 4px; }
.scale-item {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.04em;
  padding: 5px 8px; border-radius: 3px; border: none;
  background: none; color: var(--text-mid); cursor: pointer;
  text-align: left; transition: background 0.08s, color 0.08s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.scale-item:hover { background: var(--blue-faint); color: var(--blue); }
.scale-item.active { background: var(--blue-light); color: var(--blue); font-weight: 500; }
.search-results { display: flex; flex-direction: column; gap: 1px; }
.search-result-item {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.04em;
  padding: 5px 8px; border-radius: 3px; border: none;
  background: none; color: var(--text-mid); cursor: pointer;
  text-align: left; transition: background 0.08s, color 0.08s;
  display: flex; align-items: baseline; gap: 8px; width: 100%;
}
.search-result-item:hover { background: var(--blue-faint); color: var(--blue); }
.search-result-item.active { background: var(--blue-light); color: var(--blue); font-weight: 500; }
.sri-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sri-cat { font-size: 8px; color: var(--text-dim); flex-shrink: 0; white-space: nowrap; }
.search-result-item.active .sri-cat { color: var(--blue-mid); }
.search-empty { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); padding: 10px; text-align: center; }

/* ── Controls ── */
.controls-grid { display: flex; flex-direction: column; gap: 17px; }
.ctrl-row { display: flex; flex-direction: column; gap: 5px; }
.ctrl-header { display: flex; justify-content: space-between; align-items: baseline; }
.ctrl-name { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase; }
.ctrl-val { font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--blue); }

input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 3px; background: var(--border-strong); border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
  background: var(--blue); border: 2px solid var(--surface); box-shadow: 0 0 0 1px var(--blue-mid);
  cursor: pointer; transition: box-shadow 0.1s;
}
input[type=range]:hover::-webkit-slider-thumb { box-shadow: 0 0 0 3px var(--blue-light); }
input[type=range]::-moz-range-thumb {
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--blue); border: 2px solid #fff; cursor: pointer;
}

.mod-row { display: flex; align-items: center; gap: 8px; }
.mod-row input[type=range] { flex: 1; }
.mod-input {
  width: 62px; padding: 4px 7px; font-family: var(--font-mono); font-size: 11px;
  border: 1px solid var(--border); border-radius: 4px; background: var(--surface-secondary);
  color: var(--text); text-align: right; outline: none;
}
.mod-input:focus { border-color: var(--blue-mid); }

/* ── Mode toggle — 5×2 grid ── */
.mode-toggle {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.mbtn {
  font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.03em;
  padding: 6px 3px; border: none; background: var(--surface-secondary); color: var(--text-dim);
  cursor: pointer; transition: all 0.1s;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  text-align: center; line-height: 1.3;
}
.mbtn:nth-child(5n)  { border-right: none; }
.mbtn:nth-child(n+6) { border-bottom: none; }
.mbtn:hover  { background: var(--blue-faint); color: var(--blue); }
.mbtn.active { background: var(--blue-light); color: var(--blue); font-weight: 500; }

/* ── Mode legend chips ── */
.mode-legend {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
}
.mode-chip {
  font-family: var(--font-mono); font-size: 7.5px; color: var(--text-dim);
  background: var(--surface-secondary); border: 1px solid var(--border);
  border-radius: 3px; padding: 2px 6px; letter-spacing: 0.04em; line-height: 1.5;
  display: none;
}
.mode-chip.visible { display: inline-block; }



/* ── Reset buttons ── */
.reset-btn {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; padding: 4px 10px;
  border-radius: 3px; border: 1px solid var(--border); background: var(--surface-secondary);
  color: var(--text-dim); cursor: pointer; transition: all 0.1s;
}
.reset-btn:hover { border-color: var(--blue-mid); color: var(--blue); background: var(--blue-faint); }

/* ── Bottom row ── */
.bottom-row {
  grid-column: 1 / -1;
}
.play-btn {
  width: 100%; padding: 10px; border-radius: 5px; border: 1.5px solid var(--border-strong);
  background: var(--surface-secondary); color: var(--text-mid); font-family: var(--font-mono);
  font-size: 13px; font-weight: 500; letter-spacing: 0.1em; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.15s;
  margin-top: 4px;
}
.play-btn:hover { border-color: var(--blue-mid); color: var(--blue); background: var(--blue-faint); }
.play-btn.on { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
.play-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.play-icon svg { fill: currentColor; }

/* ── Mobile ── */
@media (max-width: 680px) {
  body { padding: 0 10px 48px; }
  main { grid-template-columns: 1fr; }
  .scope-panel { grid-column: 1; }
  .bottom-row { grid-column: 1; }
  .library-scroll { max-height: 300px; }
  .wslider-wrap { height: 100px; }
  .notes-grid { gap: 3px; }
  .scope-inner { height: 130px; }
  .mbtn { font-size: 8px; padding: 5px 2px; }
}
@media (min-width: 681px) and (max-width: 900px) {
  .library-panel { height: 480px; }
}
/* ── Theme toggle ── */
.theme-btn {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--text-dim);
  background: none;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 5px 12px;
  cursor: pointer;
  transition: color .15s, border-color .15s;
  line-height: 1;
  flex-shrink: 0;
}
.theme-btn:hover { color: var(--text); border-color: var(--border-strong); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-name"><strong>ondine</strong></div>
    <div class="brand-sub">from scales to waves · v0.2</div>
  </div>
  <div class="header-status">
    <button class="theme-btn" id="themeToggle">☀</button>
  </div>
</header>

<main>

  <!-- Notes panel -->
  <div class="panel" style="display:flex; flex-direction:column;">
    <div class="panel-label">Scale notes</div>
    <div class="notes-grid" id="noteRow"></div>
    <div class="active-notes" id="activeNotes" style="margin-top:14px">
      <span class="label">ACTIVE —</span>
    </div>
    <div style="display:flex; justify-content:flex-end; gap:6px; margin-top:8px;">
      <button class="reset-btn" onclick="randomWeights()">random weights</button>
      <button class="reset-btn" onclick="resetWeights()">reset weights</button>
    </div>
  </div>

  <!-- Scale library panel -->
  <div class="panel library-panel">
    <div class="panel-label">Scale library</div>
    <input class="scale-search" type="text" id="scaleSearch" placeholder="search scales…" autocomplete="off" spellcheck="false">
    <div class="library-scroll" id="scaleLibraryWrap">
      <div class="folder-tree" id="folderTree"></div>
    </div>
  </div>

  <!-- Waveform plot -->
  <div class="panel scope-panel">
    <div class="panel-label">Waveform output</div>
    <div class="scope-outer">
      <div class="scope-header">
        <div class="scope-meta">mode = <b id="scopeMode">phase</b></div>
        <div class="scope-meta">mod = <b id="scopeLabel">24.0</b></div>
        <div class="scope-meta" id="kappaMetaWrap" style="display:none"><span id="scopeParamKey">κ</span> = <b id="scopeParamVal">2.5</b></div>
        <div class="scope-meta">f = <b id="scopeFreq">220 Hz</b></div>
      </div>
      <div class="scope-inner">
        <canvas id="waveChart" role="img" aria-label="Waveform of selected scale"></canvas>
      </div>
    </div>
  </div>

  <!-- Bottom row: parameters + player -->
  <div class="bottom-row">
    <!-- Controls -->
    <div class="panel">
      <div class="panel-label">Parameters</div>
      <div class="controls-grid">

        <div class="ctrl-row">
          <div class="ctrl-header" style="margin-bottom:5px">
            <span class="ctrl-name">Waveform mode</span>
          </div>
          <div class="mode-toggle">
            <button class="mbtn active" data-mode="phase"    onclick="setMode('phase')"    title="Multiply-of-sines phase modulation">phase</button>
            <button class="mbtn"        data-mode="harmonic" onclick="setMode('harmonic')" title="Additive synthesis — notes as harmonic partials">harmonic</button>
            <button class="mbtn"        data-mode="vonmises" onclick="setMode('vonmises')" title="Von Mises circular Gaussian density">von mises</button>
            <button class="mbtn"        data-mode="dft"      onclick="setMode('dft')"      title="DFT spectral synthesis — Fourier coefficients of the scale as harmonic amplitudes">dft</button>
            <button class="mbtn"        data-mode="ivec"     onclick="setMode('ivec')"     title="Interval vector / circular autocorrelation as harmonic amplitudes">int·vec</button>
            <button class="mbtn"        data-mode="riesz"    onclick="setMode('riesz')"    title="Riesz product — multiplicative cosine construction">riesz</button>
            <button class="mbtn"        data-mode="cauchy"   onclick="setMode('cauchy')"   title="Wrapped Cauchy / Poisson kernel on the circle">cauchy</button>
            <button class="mbtn"        data-mode="walsh"    onclick="setMode('walsh')"    title="Walsh square-wave harmonics — each note as a square wave partial">walsh</button>
            <button class="mbtn"        data-mode="polezero" onclick="setMode('polezero')" title="All-pole filter frequency response — poles placed at scale tones">pole·zero</button>
            <button class="mbtn"        data-mode="shepard"  onclick="setMode('shepard')"  title="Shepard-tone octave-stacked synthesis with Gaussian octave envelope">shepard</button>
          </div>
          <!-- Mode description chip -->
          <div id="modeDesc" style="font-family:var(--font-mono);font-size:8.5px;color:var(--text-dim);margin-top:5px;line-height:1.5;min-height:13px;"></div>
        </div>

        <!-- Mode parameter (shown only for vonmises, cauchy, polezero, shepard) -->
        <div class="ctrl-row" id="modeParamRow" style="display:none;flex-direction:column">
          <div class="ctrl-header">
            <span class="ctrl-name" id="modeParamName">Concentration (κ)</span>
            <span class="ctrl-val"  id="modeParamDisplay">2.5</span>
          </div>
          <input type="range" id="modeParamSlider" min="0.3" max="8" step="0.1" value="2.5">
        </div>

        <div class="ctrl-row">
          <div class="ctrl-header">
            <span class="ctrl-name">Modulo</span>
            <span class="ctrl-val" id="modDisplay">12.0</span>
          </div>
          <div class="mod-row">
            <input type="range" id="modSlider" min="1" max="48" step="0.5" value="12">
            <input class="mod-input" type="number" id="modNum" min="0.5" max="96" step="0.5" value="12">
          </div>
        </div>

        <div class="ctrl-row">
          <div class="ctrl-header">
            <span class="ctrl-name">Pitch</span>
            <span class="ctrl-val" id="freqOut">220 Hz</span>
          </div>
          <input type="range" id="freqSlider" min="30" max="880" step="1" value="220">
        </div>

        <div class="ctrl-row">
          <div class="ctrl-header">
            <span class="ctrl-name">Volume</span>
            <span class="ctrl-val" id="volOut">70%</span>
          </div>
          <input type="range" id="volSlider" min="0" max="100" step="1" value="70">
        </div>

        <button class="play-btn" id="playBtn" aria-label="Play waveform" style="margin-top:14px">
          <div class="play-icon" id="playIcon">
            <svg viewBox="0 0 18 18" width="18" height="18"><polygon points="4,2 16,9 4,16"/></svg>
          </div>
          <span id="playLabel">PLAY</span>
        </button>

      </div>
    </div>
  </div>

</main>

<script>
/* ══════════════════════════════════════════════════════
   SCALE LIBRARY
══════════════════════════════════════════════════════ */
const SCALE_LIBRARY = [
  { cat: "Major and minor scales", scales: [
    ["Ionian (Major)",        [0,2,4,5,7,9,11]],
    ["Dorian",                [0,2,3,5,7,9,10]],
    ["Phrygian",              [0,1,3,5,7,8,10]],
    ["Lydian",                [0,2,4,6,7,9,11]],
    ["Mixolydian",            [0,2,4,5,7,9,10]],

/* ══════════════════════════════════════════════════════
   WAVEFORM MATH — 10 MODES
══════════════════════════════════════════════════════ */

/* 1. PHASE — original mode */
function computeSamplesPhase(shifts, weights, mod, n) {
  const arr = new Float32Array(n);
  let mx = 0;
  for (let i = 0; i < n; i++) {
    const x = i / n * mod;
    let v = 1;
    for (const s of shifts) {
      const sv = Math.sin(Math.PI * (x - s) / 12);
      v *= (1 - weights[s]) + weights[s] * sv;
    }
    arr[i] = v;
    if (Math.abs(v) > mx) mx = Math.abs(v);
  }
  if (mx > 0) for (let i = 0; i < n; i++) arr[i] /= mx;
  return arr;
}

/* 2. HARMONIC — original mode */
function computeSamplesHarmonic(shifts, weights, mod, n) {
  const arr = new Float32Array(n);
  let mx = 0;
  for (let i = 0; i < n; i++) {
    const x = i / n * mod;
    let v = 0;
    for (const s of shifts) v += weights[s] * Math.sin(2 * Math.PI * (s + 1) / 12 * x);
    arr[i] = v;
    if (Math.abs(v) > mx) mx = Math.abs(v);
  }
  if (mx > 0) for (let i = 0; i < n; i++) arr[i] /= mx;
  return arr;
}

/* 3. VON MISES — original mode */
function computeSamplesVonMises(shifts, weights, mod, kap, n) {
  const arr = new Float32Array(n);
  let mx = -Infinity, mn = Infinity;
  for (let i = 0; i < n; i++) {
    const x = i / n * mod;
    let v = 0;
    for (const s of shifts) v += weights[s] * Math.exp(kap * Math.cos(2 * Math.PI * (x - s) / 12));
    arr[i] = v;
    if (v > mx) mx = v;
    if (v < mn) mn = v;
  }
  const range = mx - mn;
  if (range > 0) { const mid = (mx + mn) / 2; for (let i = 0; i < n; i++) arr[i] = (arr[i] - mid) / (range / 2); }
  return arr;
}

/* 4. DFT SPECTRAL
   Compute the DFT of the weighted pitch-class indicator vector.
   |F[k]| and arg(F[k]) for k=1..6 become harmonic amplitudes and phase offsets.
   Z-related scale pairs produce identical timbres — audibly demonstrating the Z-relation. */
function computeSamplesDFT(shifts, weights, mod, n) {
  const v = new Float64Array(12);
  for (const s of shifts) v[s] = weights[s];
  const amps = new Float64Array(6), phs = new Float64Array(6);
  for (let k = 1; k <= 6; k++) {
    let re = 0, im = 0;
    for (let j = 0; j < 12; j++) {
      const a = -2 * Math.PI * k * j / 12;
      re += v[j] * Math.cos(a);
      im += v[j] * Math.sin(a);
    }
    amps[k-1] = Math.sqrt(re*re + im*im);
    phs[k-1]  = Math.atan2(im, re);
  }
  const arr = new Float32Array(n);
  let mx = 0;
  for (let i = 0; i < n; i++) {
    const x = i / n * mod;
    let val = 0;
    for (let k = 0; k < 6; k++)
      val += amps[k] * Math.sin(2 * Math.PI * (k + 1) * x / 12 + phs[k]);
    arr[i] = val;
    if (Math.abs(val) > mx) mx = Math.abs(val);
  }
  if (mx > 0) for (let i = 0; i < n; i++) arr[i] /= mx;
  return arr;
}

/* 5. INTERVAL VECTOR
   Circular autocorrelation IV[d] = Σₖ v[k]·v[(k+d)%12] for d=1..6.
   Used as amplitudes of harmonics d=1..6. Symmetric (no phase info),
   so scales sharing an interval vector (Z-pairs) produce identical waveforms. */
function computeSamplesIVec(shifts, weights, mod, n) {
  const v = new Float64Array(12);
  for (const s of shifts) v[s] = weights[s];
  const iv = new Float64Array(6);
  for (let d = 1; d <= 6; d++)
    for (let k = 0; k < 12; k++)
      iv[d-1] += v[k] * v[(k + d) % 12];
  const arr = new Float32Array(n);
  let mx = 0;
  for (let i = 0; i < n; i++) {
    const x = i / n * mod;
    let val = 0;
    for (let d = 1; d <= 6; d++)
      val += iv[d-1] * Math.sin(2 * Math.PI * d * x / 12);
    arr[i] = val;
    if (Math.abs(val) > mx) mx = Math.abs(val);
  }
  if (mx > 0) for (let i = 0; i < n; i++) arr[i] /= mx;
  return arr;
}

/* 6. RIESZ PRODUCT
   f(x) = ∏ₛ (1 + wₛ·cos(2π(x−s)/12)) − mean
   Each factor is non-negative (product is a positive measure on the circle).
   Peaks concentrate at scale tone combinations; gaps become deep troughs. */
function computeSamplesRiesz(shifts, weights, mod, n) {
  const arr = new Float32Array(n);
  let sum = 0;
  for (let i = 0; i < n; i++) {
    const x = i / n * mod;
    let val = 1;
    for (const s of shifts)
      val *= 1 + weights[s] * Math.cos(2 * Math.PI * (x - s) / 12);
    arr[i] = val; sum += val;
  }
  const mean = sum / n;
  let mx = 0;
  for (let i = 0; i < n; i++) { arr[i] -= mean; if (Math.abs(arr[i]) > mx) mx = Math.abs(arr[i]); }
  if (mx > 0) for (let i = 0; i < n; i++) arr[i] /= mx;
  return arr;
}

/* 7. WRAPPED CAUCHY / POISSON KERNEL
   f(x) = Σₛ wₛ · (1−r²) / (1 − 2r·cos(2π(x−s)/12) + r²)
   Real part of a Möbius-like sum; heavier tails than von Mises.
   r→1 gives Dirac-like spikes; r→0 gives flat density. */
function computeSamplesCauchy(shifts, weights, mod, r, n) {
  const arr = new Float32Array(n);
  let mx = -Infinity, mn = Infinity;
  for (let i = 0; i < n; i++) {
    const x = i / n * mod;
    let val = 0;
    for (const s of shifts) {
      const theta = 2 * Math.PI * (x - s) / 12;
      val += weights[s] * (1 - r * r) / (1 - 2 * r * Math.cos(theta) + r * r);
    }
    arr[i] = val;
    if (val > mx) mx = val;
    if (val < mn) mn = val;
  }
  const range = mx - mn;
  if (range > 0) { const mid = (mx + mn) / 2; for (let i = 0; i < n; i++) arr[i] = (arr[i] - mid) / (range / 2); }
  return arr;
}

/* 8. WALSH / SQUARE-WAVE HARMONICS
   Replace each sin partial with sign(sin(…)) — a square wave at that frequency.
   Rich in odd harmonics; sounds digital and aggressive compared to harmonic mode. */
function computeSamplesWalsh(shifts, weights, mod, n) {
  const arr = new Float32Array(n);
  let mx = 0;
  for (let i = 0; i < n; i++) {
    const x = i / n * mod;
    let val = 0;
    for (const s of shifts)
      val += weights[s] * Math.sign(Math.sin(2 * Math.PI * (s + 1) / 12 * x));
    arr[i] = val;
    if (Math.abs(val) > mx) mx = Math.abs(val);
  }
  if (mx > 0) for (let i = 0; i < n; i++) arr[i] /= mx;
  return arr;
}

/* 9. POLE-ZERO / ALL-POLE FILTER RESPONSE
   Poles placed at r·e^(2πis/12) inside the unit circle.
   log|H(e^iθ)| = −Σₛ wₛ·log|e^iθ − r·e^(2πis/12)|
   After centering: sharp resonant peaks at scale tones, attenuation elsewhere. */
function computeSamplesPoleZero(shifts, weights, mod, r, n) {
  const arr = new Float32Array(n);
  let mx = -Infinity, mn = Infinity;
  for (let i = 0; i < n; i++) {
    const theta = 2 * Math.PI * (i / n * mod) / 12;
    let logMag = 0;
    for (const s of shifts) {
      const phi = 2 * Math.PI * s / 12;
      const dRe = Math.cos(theta) - r * Math.cos(phi);
      const dIm = Math.sin(theta) - r * Math.sin(phi);
      logMag -= weights[s] * Math.log(Math.sqrt(dRe * dRe + dIm * dIm) + 1e-9);
    }
    arr[i] = logMag;
    if (logMag > mx) mx = logMag;
    if (logMag < mn) mn = logMag;
  }
  const range = mx - mn;
  if (range > 0) { const mid = (mx + mn) / 2; for (let i = 0; i < n; i++) arr[i] = (arr[i] - mid) / (range / 2); }
  return arr;
}

/* 10. SHEPARD-TONE STACKING
   Each scale tone s stacked across 5 octaves k=0..4 with Gaussian envelope G(k).
   Frequencies: (s + 12k + 1)/12 — non-harmonic across octaves, producing
   an ambiguous, layered timbre. σ controls octave spread. */
function computeSamplesShepard(shifts, weights, mod, sigma, n) {
  const nOct = 5, center = 2;
  const arr  = new Float32Array(n);
  let mx = 0;
  for (let i = 0; i < n; i++) {
    const x = i / n * mod;
    let val = 0;
    for (const s of shifts) {
      for (let k = 0; k < nOct; k++) {
        const g = Math.exp(-((k - center) ** 2) / (2 * sigma * sigma));
        val += weights[s] * g * Math.sin(2 * Math.PI * (s + 12 * k + 1) / 12 * x);
      }
    }
    arr[i] = val;
    if (Math.abs(val) > mx) mx = Math.abs(val);
  }
  if (mx > 0) for (let i = 0; i < n; i++) arr[i] /= mx;
  return arr;
}

/* ── Dispatch ── */
function computeSamples(shifts, weights, mod, param, n) {
  switch (waveMode) {
    case 'harmonic':  return computeSamplesHarmonic(shifts, weights, mod, n);
    case 'vonmises':  return computeSamplesVonMises(shifts, weights, mod, param, n);
    case 'dft':       return computeSamplesDFT(shifts, weights, mod, n);
    case 'ivec':      return computeSamplesIVec(shifts, weights, mod, n);
    case 'riesz':     return computeSamplesRiesz(shifts, weights, mod, n);
    case 'cauchy':    return computeSamplesCauchy(shifts, weights, mod, param, n);
    case 'walsh':     return computeSamplesWalsh(shifts, weights, mod, n);
    case 'polezero':  return computeSamplesPoleZero(shifts, weights, mod, param, n);
    case 'shepard':   return computeSamplesShepard(shifts, weights, mod, param, n);
    default:          return computeSamplesPhase(shifts, weights, mod, n);
  }
}

/* ══════════════════════════════════════════════════════
   AUDIO ENGINE
══════════════════════════════════════════════════════ */
const N_BUF     = 4096;
const MORPH_LEN = 4096;

let audioCtx   = null;
let masterGain = null;
let playGain   = null;
let scriptNode = null;

let wavetable  = new Float32Array(N_BUF);
let nextTable  = null;
let morphPos   = 1;
let phase      = 0;
let smoothFreq = 220;

function ensureCtx() {
  if (audioCtx) return audioCtx;
  audioCtx   = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 1;
  masterGain.connect(audioCtx.destination);
  playGain = audioCtx.createGain();
  playGain.gain.value = 0;
  playGain.connect(masterGain);
  scriptNode = audioCtx.createScriptProcessor(2048, 0, 1);
  scriptNode.connect(playGain);
  scriptNode.onaudioprocess = e => {
    const out = e.outputBuffer.getChannelData(0);
    const tgtHz = getFreq();
    const freqTC = 0.002;
    for (let i = 0; i < out.length; i++) {
      smoothFreq += (tgtHz - smoothFreq) * freqTC;
      const phaseInc = smoothFreq * N_BUF / 44100;
      const i0 = phase | 0;
      const i1 = (i0 + 1) % N_BUF;
      const frac = phase - i0;
      const sA = wavetable[i0] + frac * (wavetable[i1] - wavetable[i0]);
      let sample;
      if (nextTable !== null) {
        const sB = nextTable[i0] + frac * (nextTable[i1] - nextTable[i0]);
        sample = sA + morphPos * (sB - sA);
        morphPos += 1 / MORPH_LEN;
        if (morphPos >= 1) { morphPos = 1; wavetable = nextTable; nextTable = null; }
      } else {
        sample = sA;
      }
      out[i] = sample;
      phase = (phase + phaseInc) % N_BUF;
    }
  };
  return audioCtx;
}

function getFreq() { return +document.getElementById('freqSlider').value; }
function getVol()  { return +document.getElementById('volSlider').value / 100; }

function buildTable() {
  const shifts = [...selected].sort((a, b) => a - b);
  return computeSamples(shifts, noteWeights, effectiveMod(), modeParam, N_BUF);
}

function scheduleTable(table) { nextTable = table; morphPos = 0; }

function togglePlay() {
  const ac = ensureCtx();
  if (ac.state === 'suspended') ac.resume();
  if (isPlaying) {
    isPlaying = false;
    updatePlayBtn();
    playGain.gain.setValueAtTime(playGain.gain.value, ac.currentTime);
    playGain.gain.linearRampToValueAtTime(0, ac.currentTime + 0.05);
  } else {
    wavetable  = buildTable();
    nextTable  = null; morphPos = 1; phase = 0;
    smoothFreq = getFreq();
    isPlaying  = true;
    updatePlayBtn();
    playGain.gain.setValueAtTime(0, ac.currentTime);
    playGain.gain.linearRampToValueAtTime(getVol(), ac.currentTime + 0.05);
  }
}

document.getElementById('playBtn').onclick = togglePlay;

/* ══════════════════════════════════════════════════════
   PARAMETER SLIDERS
══════════════════════════════════════════════════════ */
document.getElementById('freqSlider').oninput = function () {
  document.getElementById('freqOut').textContent   = this.value + ' Hz';
  document.getElementById('scopeFreq').textContent = this.value + ' Hz';
};
document.getElementById('freqSlider').ondblclick = function () {
  this.value = 220;
  document.getElementById('freqOut').textContent   = '220 Hz';
  document.getElementById('scopeFreq').textContent = '220 Hz';
};

document.getElementById('volSlider').oninput = function () {
  document.getElementById('volOut').textContent = this.value + '%';
  if (playGain && audioCtx) playGain.gain.setTargetAtTime(getVol(), audioCtx.currentTime, 0.015);
};
document.getElementById('volSlider').ondblclick = function () {
  this.value = 70;
  document.getElementById('volOut').textContent = '70%';
  if (playGain && audioCtx) playGain.gain.setTargetAtTime(getVol(), audioCtx.currentTime, 0.015);
};

document.getElementById('modSlider').oninput = function () {
  modulo = +this.value;
  document.getElementById('modNum').value            = modulo;
  document.getElementById('modDisplay').textContent  = modulo.toFixed(1);
  document.getElementById('scopeLabel').textContent  = effectiveMod().toFixed(1);
  refresh();
};
document.getElementById('modSlider').ondblclick = function () {
  modulo = 12; this.value = 12;
  document.getElementById('modNum').value            = 12;
  document.getElementById('modDisplay').textContent  = '12.0';
  document.getElementById('scopeLabel').textContent  = effectiveMod().toFixed(1);
  refresh();
};

document.getElementById('modNum').oninput = function () {
  let v = parseFloat(this.value);
  if (isNaN(v) || v < 0.5) return;
  v = Math.min(96, v);
  modulo = v;
  document.getElementById('modSlider').value        = Math.min(48, v);
  document.getElementById('modDisplay').textContent = v.toFixed(1);
  document.getElementById('scopeLabel').textContent = effectiveMod().toFixed(1);
  refresh();
};

/* Mode parameter slider (κ / r / σ depending on active mode) */
document.getElementById('modeParamSlider').oninput = function () {
  modeParam = +this.value;
  const cfg = MODE_PARAM_CFG[waveMode];
  if (cfg) {
    document.getElementById('modeParamDisplay').textContent = cfg.fmt(modeParam);
    document.getElementById('scopeParamVal').textContent    = cfg.fmt(modeParam);
  }
  refresh();
};
document.getElementById('modeParamSlider').ondblclick = function () {
  const cfg = MODE_PARAM_CFG[waveMode];
  if (!cfg) return;
  modeParam = cfg.def; this.value = modeParam;
  document.getElementById('modeParamDisplay').textContent = cfg.fmt(modeParam);
  document.getElementById('scopeParamVal').textContent    = cfg.fmt(modeParam);
  refresh();
};

/* ══════════════════════════════════════════════════════
   SET MODE
══════════════════════════════════════════════════════ */
function setMode(m) {
  waveMode = m;

  /* Update all mode buttons */
  document.querySelectorAll('.mbtn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));

  /* Mode description */
  document.getElementById('modeDesc').textContent = MODE_DESCRIPTIONS[m] || '';

  /* Mode parameter row */
  const cfg  = MODE_PARAM_CFG[m];
  const show = !!cfg;
  const pr   = document.getElementById('modeParamRow');
  pr.style.display       = show ? 'flex' : 'none';
  pr.style.flexDirection = 'column';
  document.getElementById('kappaMetaWrap').style.display = show ? '' : 'none';

  if (cfg) {
    const sl = document.getElementById('modeParamSlider');
    sl.min = cfg.min; sl.max = cfg.max; sl.step = cfg.step; sl.value = cfg.def;
    modeParam = cfg.def;
    document.getElementById('modeParamName').textContent    = cfg.label;
    document.getElementById('modeParamDisplay').textContent = cfg.fmt(modeParam);
    document.getElementById('scopeParamKey').textContent    = cfg.scopeLabel;
    document.getElementById('scopeParamVal').textContent    = cfg.fmt(modeParam);
  }

  const modeLabels = {
    phase: 'phase', harmonic: 'harmonic', vonmises: 'von mises',
    dft: 'dft spectral', ivec: 'int. vector', riesz: 'riesz product',
    cauchy: 'wrapped cauchy', walsh: 'walsh', polezero: 'pole·zero', shepard: 'shepard'
  };
  document.getElementById('scopeMode').textContent  = modeLabels[m] || m;
  document.getElementById('scopeLabel').textContent = effectiveMod().toFixed(1);
  refresh();
}

/* ══════════════════════════════════════════════════════
   AUDIO REBUILD DEBOUNCE
══════════════════════════════════════════════════════ */
let morphTimer = null;
function restartIfPlaying() {
  if (!isPlaying) return;
  clearTimeout(morphTimer);
  morphTimer = setTimeout(() => { if (isPlaying) scheduleTable(buildTable()); }, 30);
}

/* ══════════════════════════════════════════════════════
   CHART UPDATE (RAF-GATED)
══════════════════════════════════════════════════════ */
let chartRafId = null;
let chartDirty = false;
function scheduleChartUpdate() {
  chartDirty = true;
  if (chartRafId !== null) return;
  chartRafId = requestAnimationFrame(function drain() {
    chartRafId = null;
    if (!chartDirty) return;
    chartDirty = false;
    updateChart();
  });
}

function updateChart() {
  const shifts  = [...selected].sort((a, b) => a - b);
  const em      = effectiveMod();
  const samples = computeSamples(shifts, noteWeights, em, modeParam, N_CHART);
  chart.data.labels           = Array.from({length: N_CHART}, (_, i) => +(i / N_CHART * em).toFixed(3));
  chart.data.datasets[0].data = Array.from(samples);
  chart.update('none');
}

/* ══════════════════════════════════════════════════════
   UI REFRESH
══════════════════════════════════════════════════════ */
function updateNoteButtons() {
  for (let i = 0; i < 12; i++) {
    const b  = document.getElementById('nb' + i);
    b.className = 'nbtn' + (i === 0 ? ' root' : selected.has(i) ? ' on' : '');
    const ws = document.getElementById('ws' + i);
    if (ws) ws.closest('.wslider-wrap').style.opacity = (i === 0 || selected.has(i)) ? '1' : '0.35';
  }
}

function updateScaleHighlight() {
  const key = [...selected].sort((a,b) => a-b).join(',');
  document.querySelectorAll('.scale-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.notes === key);
  });
  if (searchResultsEl) {
    searchResultsEl.querySelectorAll('.search-result-item').forEach(btn => {
      const nameEl = btn.querySelector('.sri-name');
      if (!nameEl) return;
      const match = ALL_SCALES.find(s => s.name === nameEl.textContent);
      if (match) btn.classList.toggle('active', [...match.notes].sort((a,b)=>a-b).join(',') === key);
    });
  }
}

function updateActiveNotes() {
  const el     = document.getElementById('activeNotes');
  const sorted = [...selected].sort((a, b) => a - b);
  el.innerHTML = '<span class="label">ACTIVE —</span>' +
    sorted.map(i => `<span class="note-tag">${i}</span>`).join('');
}

function refresh() {
  updateNoteButtons();
  updateScaleHighlight();
  updateActiveNotes();
  scheduleChartUpdate();
  restartIfPlaying();
}

function updatePlayBtn() {
  const btn = document.getElementById('playBtn');
  btn.classList.toggle('on', isPlaying);
  document.getElementById('playLabel').textContent  = isPlaying ? 'Stop' : 'Play';
  document.getElementById('playIcon').innerHTML     = isPlaying
    ? '<svg viewBox="0 0 18 18" width="16" height="16" fill="currentColor"><rect x="3" y="2" width="4" height="14"/><rect x="11" y="2" width="4" height="14"/></svg>'
    : '<svg viewBox="0 0 18 18" width="16" height="16" fill="currentColor"><polygon points="4,2 16,9 4,16"/></svg>';
}

/* ══════════════════════════════════════════════════════
   VERTICAL SLIDER FIT
══════════════════════════════════════════════════════ */
function fitSliders() {
  document.querySelectorAll('.wslider-wrap').forEach(wrap => {
    const h  = wrap.clientHeight;
    const sl = wrap.querySelector('.wslider');
    sl.style.width      = h + 'px';
    sl.style.marginLeft = (-h / 2) + 'px';
    sl.style.marginTop  = '-2px';
  });
}
window.addEventListener('resize', fitSliders);

/* ══════════════════════════════════════════════════════
   WEIGHT HELPERS
══════════════════════════════════════════════════════ */
function resetWeights() {
  const sy = window.scrollY;
  noteWeights.fill(1);
  for (let i = 0; i < 12; i++) {
    const sl = document.getElementById('ws' + i);
    const vl = document.getElementById('wv' + i);
    if (sl) sl.value = 64;
    if (vl) vl.textContent = '64';
  }
  refresh();
  window.scrollTo({ top: sy, behavior: 'instant' });
}

function randomWeights() {
  const sy = window.scrollY;
  for (let i = 0; i < 12; i++) {
    const v = Math.floor(Math.random() * 128);
    noteWeights[i] = v / 64;
    const sl = document.getElementById('ws' + i);
    const vl = document.getElementById('wv' + i);
    if (sl) sl.value = v;
    if (vl) vl.textContent = v;
  }
  refresh();
  window.scrollTo({ top: sy, behavior: 'instant' });
}

/* ── Theme toggle ── */
let currentTheme = 'dark';
document.getElementById('themeToggle').addEventListener('click', () => {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';

  /* Disable all transitions for the duration of the theme switch */
  const noTrans = document.createElement('style');
  noTrans.textContent = '*, *::before, *::after { transition: none !important; }';
  document.head.appendChild(noTrans);

  document.documentElement.dataset.theme = currentTheme === 'dark' ? 'dark' : '';
  document.getElementById('themeToggle').textContent = currentTheme === 'dark' ? '☀' : '☽';

  /* Update chart colors */
  const isDark = currentTheme === 'dark';
  chart.data.datasets[0].borderColor = isDark ? '#a0a0a0' : '#1a56db';
  chart.data.datasets[0].fill = {
    target: 'origin',
    above: isDark ? 'rgba(160,160,160,0.07)' : 'rgba(26,86,219,0.06)',
    below: isDark ? 'rgba(160,160,160,0.07)' : 'rgba(26,86,219,0.06)'
  };
  const gridColor   = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
  const tickColor   = isDark ? '#555555' : '#9ca3af';
  const borderColor = isDark ? '#2a2a2a' : '#d1d9e6';
  chart.options.scales.x.grid.color   = gridColor;
  chart.options.scales.x.border.color = borderColor;
  chart.options.scales.x.ticks.color  = tickColor;
  chart.options.scales.y.grid.color   = gridColor;
  chart.options.scales.y.border.color = borderColor;
  chart.options.scales.y.ticks.color  = tickColor;
  chart.update('none');

  /* Re-enable transitions on the next frame */
  requestAnimationFrame(() => noTrans.remove());
});

/* Open first folder by default */
const firstHeader = document.getElementById('fh0');
const firstBody   = document.getElementById('fb0');
if (firstHeader && firstBody) {
  firstHeader.classList.add('open');
  firstBody.classList.add('open');
}

setMode('phase');   /* syncs all UI state and triggers initial refresh */
fitSliders();
</script>
</body>
</html>
